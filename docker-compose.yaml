services:
  # Instance Ollama principale sur le NAS
  ollama-local:
    image: ollama/ollama:latest
    container_name: ollama-local-nas
    network_mode: host
    volumes:
      - ./ollama_data:/root/.ollama
    restart: always

  # Service éphémère pour garantir le pull de tinyllama
  ollama-puller:
    image: curlimages/curl:latest
    container_name: ollama-puller
    depends_on:
      - ollama-local
    entrypoint: [ "sh", "-c", "sleep 5 && curl -X POST http://ollama-local:11434/api/pull -d '{\"name\": \"tinyllama\"}'" ]

  # Le Proxy Node.js
  ollama-proxy:
    build: .
    container_name: ollama-proxy
    network_mode: host
    depends_on:
      - ollama-local
    restart: always
